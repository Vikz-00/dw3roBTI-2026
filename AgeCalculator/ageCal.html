<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
     <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="ageJS.js"></script>
 <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 340px;
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 24px;
      color: #222;
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 6px;
      font-size: 0.95rem;
      color: #333;
    }

    input[type="date"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 14px;
      box-sizing: border-box;
      outline: none;
    }

    input[type="date"]:focus {
      border-color: #888;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #555;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 18px;
    }

    button:hover {
      background: #333;
    }

    .result {
      font-size: 1rem;
      color: #222;
    }

    .error {
      color: #c0392b;
      font-size: 0.9rem;
    }
    </style>
</head>
<body>

    
<div class="container">
    <h1>Age Calculator</h1>

    <label for="birthdate">Enter your birth date:</label>
    <input type="date" id="birthdate" />

    <button onclick="calcularEdad()">Calculate</button>

    <p id="output"></p>
</body>
</html>
